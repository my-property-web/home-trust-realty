kind = "web"
previewPath = "/"
title = "Real Estate Service"
version = "1.0.0"
id = "artifacts/real-estate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20263
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/real-estate run dev"

[services.env]
PORT = "20263"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/real-estate", "run", "build"]
publicDir = "artifacts/real-estate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
